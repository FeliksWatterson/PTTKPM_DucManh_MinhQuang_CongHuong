<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Đăng nhập Admin | Mộc E-Commerce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/admin-style.css}" />
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center"
    style="min-height: 100vh"
  >
    <div class="admin-card p-5" style="width: 400px">
      <div class="text-center mb-4">
        <img th:src="@{/images/logo/logo.svg}" alt="Logo" width="150" />
        <h5 class="mt-3 fw-bold">Admin Portal</h5>
      </div>

      <form th:action="@{/do-login}" method="post">
        <div class="mb-3">
          <label class="form-label">Email quản trị</label>
          <input type="email" name="username" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input
            type="password"
            name="password"
            class="form-control"
            required
          />
        </div>
        <div
          th:if="${loginError}"
          class="alert alert-danger"
          role="alert"
          style="font-size: 0.9rem; margin-bottom: 15px"
        >
          <p th:text="${loginError}" style="margin: 0"></p>
        </div>
        <button type="submit" class="btn btn-moc w-100 mt-2">Đăng nhập</button>
      </form>
    </div>
  </body>
</html>
