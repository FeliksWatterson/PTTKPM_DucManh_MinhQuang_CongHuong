<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard - Mộc E-Commerce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/admin-style.css}" />
  </head>
  <body>
    <div class="d-flex">
      <div th:replace="~{admin/fragment/sidebar :: sidebar}"></div>

      <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold" style="color: var(--eerie-black)">
            Tổng quan hệ thống
          </h2>
          <span class="badge bg-moc-accent p-2 fs-6">Quản trị viên</span>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-md-4">
            <div
              class="admin-card p-4 text-center border-bottom border-4 border-moc"
              style="border-bottom-color: var(--salmon-pink) !important"
            >
              <h6
                class="text-uppercase fw-bold"
                style="color: var(--sonic-silver)"
              >
                Doanh thu tháng
              </h6>
              <h3 class="fw-bold mt-2" style="color: var(--eerie-black)">
                0 ₫
              </h3>
            </div>
          </div>
          <div class="col-md-4">
            <div
              class="admin-card p-4 text-center border-bottom border-4 border-moc"
              style="border-bottom-color: var(--sonic-silver) !important"
            >
              <h6
                class="text-uppercase fw-bold"
                style="color: var(--sonic-silver)"
              >
                Đơn hàng mới
              </h6>
              <h3 class="fw-bold mt-2" style="color: var(--eerie-black)">0</h3>
            </div>
          </div>
          <div class="col-md-4">
            <div
              class="admin-card p-4 text-center border-bottom border-4 border-moc"
              style="border-bottom-color: var(--onyx) !important"
            >
              <h6
                class="text-uppercase fw-bold"
                style="color: var(--sonic-silver)"
              >
                Sản phẩm
              </h6>
              <h3 class="fw-bold mt-2" style="color: var(--eerie-black)">24</h3>
            </div>
          </div>
        </div>

        <div class="admin-card p-4">
          <h5 class="fw-bold mb-3" style="color: var(--eerie-black)">
            Đơn hàng gần đây
          </h5>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr style="color: var(--sonic-silver)">
                  <th>Mã đơn</th>
                  <th>Khách hàng</th>
                  <th>Ngày đặt</th>
                  <th>Tổng tiền</th>
                  <th>Trạng thái</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="fw-bold text-moc-accent">#MOC1234</td>
                  <td>Lê Minh Quang</td>
                  <td style="color: var(--sonic-silver)">02/06/2026</td>
                  <td class="fw-bold">450.000 ₫</td>
                  <td>
                    <span class="badge bg-warning text-dark">Chờ xử lý</span>
                  </td>
                  <td>
                    <button class="btn btn-sm border-moc">
                      <ion-icon name="eye-outline"></ion-icon>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
